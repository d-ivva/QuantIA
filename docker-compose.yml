services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres-aula
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: quantia
    ports:
      - "5432:5432"
    volumes:
      - dados-postgres:/var/lib/postgresql/data
    networks:
      - rede-db

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-aula
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - rede-db

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak-quantia
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8180:8080"
    volumes:
      - dados-keycloak:/opt/keycloak/data
    networks:
      - rede-db

volumes:
  dados-postgres:
  dados-keycloak:

networks:
  rede-db:
    driver: bridge
