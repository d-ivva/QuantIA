services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres-aula
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: quantia
      # O banco "produtosdb" é criado automaticamente na primeira vez.
    ports:
      - "5432:5432"
      # Expõe a porta 5432 do container para o Windows.
      # A API .NET conecta via localhost:5432.
    volumes:
      - dados-postgres:/var/lib/postgresql/data
      # Persiste os dados mesmo ao parar/reiniciar o container.
    networks:
      - rede-db

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-aula
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
      # Acesse o pgAdmin em: http://localhost:8080
    depends_on:
      - postgres
    networks:
      - rede-db

volumes:
  dados-postgres:

networks:
  rede-db:
    driver: bridge